name: 備品購入申請
description: 備品や消耗品の購入に関する事務処理を依頼します
title: "[備品購入] "
body:
  - type: markdown
    attributes:
      value: |
        備品購入に関する事務処理用のテンプレートです。

        新規 issue の初期状態は `やること` として扱います。
  - type: input
    id: item_name
    attributes:
      label: 品名
      placeholder: 例: 耐震工事用具
    validations:
      required: true
  - type: textarea
    id: purpose
    attributes:
      label: 用途
      description: 何のために必要かを書いてください
      placeholder: 例: 研究室の設備整備のため
    validations:
      required: true
  - type: input
    id: vendor
    attributes:
      label: 購入先
      placeholder: 例: Amazon、モノタロウ、学内購買
    validations:
      required: false
  - type: input
    id: estimated_cost
    attributes:
      label: 想定金額
      placeholder: 例: 12000 円
    validations:
      required: false
  - type: input
    id: fiscal_year
    attributes:
      label: 年度
      description: 必要なら記入してください
      placeholder: 例: 2026
    validations:
      required: false
  - type: input
    id: desired_date
    attributes:
      label: 希望納期
      placeholder: 例: 2026-04-15
    validations:
      required: false
  - type: dropdown
    id: advance_payment
    attributes:
      label: 立替の有無
      options:
        - あり
        - なし
        - 未定
    validations:
      required: true
  - type: dropdown
    id: receipts
    attributes:
      label: 領収書
      options:
        - あり
        - 後で提出
        - 不要
        - 未定
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: 備考
      description: 型番、URL、急ぎの事情などがあれば書いてください
    validations:
      required: false
