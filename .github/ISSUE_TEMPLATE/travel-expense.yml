name: 旅費申請
description: 旅費精算や出張関連の事務処理を依頼します
title: "[旅費] "
body:
  - type: markdown
    attributes:
      value: |
        旅費に関する事務処理用のテンプレートです。

        新規 issue の初期状態は `やること` として扱います。
  - type: textarea
    id: purpose
    attributes:
      label: 用件
      description: 出張や申請の目的を簡潔に書いてください
      placeholder: 例: 学会参加、共同研究打合せ
    validations:
      required: true
  - type: input
    id: destination
    attributes:
      label: 出張先
      placeholder: 例: 東京大学、本郷キャンパス
    validations:
      required: true
  - type: input
    id: period
    attributes:
      label: 日程
      description: 日付の範囲や期間を書いてください
      placeholder: 例: 2026-04-10 から 2026-04-12
    validations:
      required: true
  - type: input
    id: fiscal_year
    attributes:
      label: 年度
      description: 必要なら記入してください
      placeholder: 例: 2026
    validations:
      required: false
  - type: textarea
    id: cost_breakdown
    attributes:
      label: 予定費用
      description: 分かる範囲で交通費、宿泊費などを書いてください
      placeholder: |
        交通費:
        宿泊費:
        その他:
    validations:
      required: false
  - type: dropdown
    id: advance_payment
    attributes:
      label: 立替の有無
      options:
        - あり
        - なし
        - 未定
    validations:
      required: true
  - type: dropdown
    id: receipts
    attributes:
      label: 領収書
      options:
        - あり
        - 後で提出
        - 不要
        - 未定
    validations:
      required: true
  - type: input
    id: due_date
    attributes:
      label: 希望処理期限
      description: 急ぎの場合は期限を書いてください
      placeholder: 例: 2026-04-20
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: 備考
      description: 追加の事情や共有事項があれば書いてください
    validations:
      required: false
